<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Roulette</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0f0f0f;color:#eee;font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:12px 12px 40px}
h1{font-size:1.4rem;letter-spacing:.2em;color:#c9a84c;margin:8px 0 2px}
.sub{font-size:.65rem;color:#666;letter-spacing:.3em;margin-bottom:12px}
.bar{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:440px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:10px 16px;margin-bottom:12px}
.bar .name{font-size:.8rem;color:#aaa}
.bar .bal{font-size:1.4rem;color:#c9a84c;font-weight:700}
.wheel-wrap{position:relative;width:min(260px,80vw);height:min(260px,80vw);margin-bottom:14px}
canvas{width:100%;height:100%}
.needle{position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-top:22px solid #c9a84c;filter:drop-shadow(0 0 4px #c9a84c);z-index:5}
.panel{width:100%;max-width:440px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:14px}
.label{font-size:.6rem;color:#666;letter-spacing:.3em;text-transform:uppercase;margin-bottom:8px}
.grid{display:grid;grid-template-columns:repeat(13,1fr);gap:2px;margin-bottom:12px}
.nb{aspect-ratio:1;border-radius:2px;border:none;font-size:clamp(7px,2vw,11px);font-weight:600;cursor:pointer;transition:.1s;display:flex;align-items:center;justify-content:center;user-select:none}
.nb:active{transform:scale(.88)}
.nb.r{background:#6a1308;color:#faa}
.nb.b{background:#222;color:#ccc}
.nb.z{background:#0d4a20;color:#4c9;grid-column:span 2;aspect-ratio:auto;padding:4px 0}
.nb.sel{outline:2px solid #c9a84c;color:#c9a84c!important}
.nb:disabled{opacity:.3;cursor:not-allowed;transform:none!important}
.chips{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.chip{width:36px;height:36px;border-radius:50%;border:2px dashed;background:none;font-size:.6rem;font-weight:700;cursor:pointer;transition:.1s;display:flex;align-items:center;justify-content:center}
.chip:active{transform:scale(.88)}
.chip.on{box-shadow:0 0 8px currentColor;filter:brightness(1.4)}
.chip:disabled{opacity:.3;cursor:not-allowed}
.c1{border-color:#aaa;color:#aaa}.c5{border-color:#e55;color:#e55}
.c10{border-color:#4af;color:#4af}.c25{border-color:#4d4;color:#4d4}.c100{border-color:#c9a84c;color:#c9a84c}
.bet-row{display:flex;align-items:center;justify-content:space-between}
.bet-val{font-size:1.1rem;color:#c9a84c;font-weight:700}
.spin{width:100%;margin-top:12px;padding:13px;background:linear-gradient(135deg,#7a5a10,#c9a84c,#7a5a10);border:none;border-radius:4px;color:#0f0f0f;font-size:.85rem;font-weight:700;letter-spacing:.25em;text-transform:uppercase;cursor:pointer;transition:.15s}
.spin:active:not(:disabled){transform:scale(.97)}
.spin:disabled{opacity:.4;cursor:not-allowed}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9;opacity:0;pointer-events:none;transition:.25s}
.overlay.on{opacity:1;pointer-events:auto}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);background:#161616;border:1px solid #c9a84c;border-radius:8px;padding:28px 36px;text-align:center;z-index:10;opacity:0;pointer-events:none;transition:.3s cubic-bezier(.34,1.56,.64,1);width:82vw;max-width:300px}
.toast.on{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto}
.t-num{font-size:3.5rem;font-weight:700;line-height:1;margin:6px 0}
.t-num.w{color:#c9a84c}.t-num.l{color:#555}
.t-verd{font-size:1.1rem;margin-bottom:4px}.t-verd.w{color:#c9a84c}.t-verd.l{color:#666}
.t-info{font-size:.75rem;color:#666}
.t-btn{margin-top:16px;padding:8px 28px;background:none;border:1px solid #c9a84c;color:#c9a84c;font-size:.8rem;letter-spacing:.2em;cursor:pointer;border-radius:3px}
</style>
</head>
<body>
<h1>ROULETTE</h1>
<div class="sub">EUROPEAN · 0–36</div>
 
<div class="bar">
  <div class="name" id="uname">—</div>
  <div class="bal">₽<span id="balv">0</span></div>
</div>
 
<div class="wheel-wrap">
  <div class="needle"></div>
  <canvas id="cv"></canvas>
</div>
 
<div class="panel">
  <div class="label">Число</div>
  <div class="grid" id="grid"></div>
  <div class="label">Фишка</div>
  <div class="chips" id="chips"></div>
  <div class="bet-row">
    <span style="font-size:.65rem;color:#555;letter-spacing:.2em;text-transform:uppercase">Ставка</span>
    <span class="bet-val">₽<span id="betv">0</span></span>
  </div>
  <button class="spin" id="spin" disabled>КРУТИТЬ</button>
</div>
 
<div class="overlay" id="ov"></div>
<div class="toast" id="toast">
  <div style="font-size:.6rem;color:#555;letter-spacing:.3em;text-transform:uppercase">ВЫПАЛО</div>
  <div class="t-num" id="tnum"></div>
  <div class="t-verd" id="tverd"></div>
  <div class="t-info" id="tinfo"></div>
  <button class="t-btn" id="tbtn">Продолжить</button>
</div>
 
<script>
const tg=window.Telegram.WebApp; tg.ready(); tg.expand();
tg.setHeaderColor("#0f0f0f"); tg.setBackgroundColor("#0f0f0f");
 
const RED=new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
const ORD=[0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
const SC=37,SA=Math.PI*2/SC;
let bal=0,selNum=null,bet=0,spinning=false,angle=0;
 
const cv=document.getElementById("cv");
const S=Math.min(window.innerWidth*.8,260);
cv.width=cv.height=S*2; cv.style.width=cv.style.height=S+"px";
const cx=cv.getContext("2d"); cx.scale(2,2);
const C=S/2,R=S/2-4;
 
function col(n){return n===0?["#0d4a20","#5fc"]:RED.has(n)?["#6a1308","#faa"]:["#1c1c1c","#ccc"]}
 
function draw(a){
  cx.clearRect(0,0,S,S);
  const rim=cx.createRadialGradient(C,C,R-8,C,C,R+6);
  rim.addColorStop(0,"#6a4a10");rim.addColorStop(.5,"#c9a84c");rim.addColorStop(1,"#3a2a08");
  cx.beginPath();cx.arc(C,C,R+6,0,Math.PI*2);cx.fillStyle=rim;cx.fill();
  for(let i=0;i<SC;i++){
    const s=a+i*SA-SA/2,e=s+SA,n=ORD[i],[f,t]=col(n);
    cx.beginPath();cx.moveTo(C,C);cx.arc(C,C,R,s,e);cx.closePath();
    cx.fillStyle=f;cx.fill();
    cx.strokeStyle="rgba(201,168,76,.15)";cx.lineWidth=.5;cx.stroke();
    const m=s+SA/2,tr=R*.8;
    cx.save();cx.translate(C+tr*Math.cos(m),C+tr*Math.sin(m));
    cx.rotate(m+Math.PI/2);cx.fillStyle=t;
    cx.font=`bold ${Math.max(7,S*.042)}px system-ui`;
    cx.textAlign="center";cx.textBaseline="middle";
    cx.fillText(n,0,0);cx.restore();
  }
  const sg=cx.createRadialGradient(C,C,R*.4,C,C,R*.6);
  sg.addColorStop(0,"rgba(0,0,0,.6)");sg.addColorStop(1,"rgba(0,0,0,0)");
  cx.beginPath();cx.arc(C,C,R*.6,0,Math.PI*2);cx.fillStyle=sg;cx.fill();
}
draw(0);
 
const g=document.getElementById("grid");
const z=document.createElement("button");
z.className="nb z";z.textContent="0";z.dataset.n=0;g.appendChild(z);
for(let n=1;n<=36;n++){const b=document.createElement("button");b.className="nb "+(RED.has(n)?"r":"b");b.textContent=n;b.dataset.n=n;g.appendChild(b);}
g.addEventListener("click",e=>{
  const b=e.target.closest(".nb");if(!b||spinning)return;
  document.querySelectorAll(".nb").forEach(x=>x.classList.remove("sel"));
  b.classList.add("sel");selNum=+b.dataset.n;upd();
});
 
[1,5,10,25,100].forEach(v=>{
  const c=document.createElement("button");
  c.className=`chip c${v}`;c.textContent=v;c.dataset.v=v;
  document.getElementById("chips").appendChild(c);
});
document.getElementById("chips").addEventListener("click",e=>{
  const c=e.target.closest(".chip");if(!c||spinning)return;
  const v=+c.dataset.v;if(v>bal)return;
  bet=v;
  document.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));
  c.classList.add("on");
  document.getElementById("betv").textContent=bet;upd();
});
 
function upd(){document.getElementById("spin").disabled=selNum===null||bet===0||spinning||bet>bal;}
function updBal(){document.getElementById("balv").textContent=bal.toLocaleString("ru-RU");}
 
document.getElementById("spin").addEventListener("click",()=>{
  if(spinning||selNum===null||bet===0||bet>bal)return;
  spinning=true;bal-=bet;updBal();dis(true);
  const win=Math.floor(Math.random()*37);
  const idx=ORD.indexOf(win);
  const fa=(-Math.PI/2-idx*SA-SA/2)-(4+Math.random()*2)*Math.PI*2;
  const sa=angle,t0=performance.now();
  const ease=t=>1-Math.pow(1-t,4);
  (function frame(now){
    const t=Math.min((now-t0)/6000,1);
    angle=sa+(fa-sa)*ease(t);draw(angle);
    if(t<1)requestAnimationFrame(frame);
    else{angle=fa;draw(angle);spinning=false;result(win);}
  })(t0);
});
 
function result(win){
  const won=win===selNum,pay=won?bet*36:0;
  if(won){bal+=pay;updBal();}
  window._pr={bet,won,pay,number:win,chosen:selNum,new_balance:bal};
  document.getElementById("tnum").textContent=win;
  document.getElementById("tnum").className="t-num "+(won?"w":"l");
  document.getElementById("tverd").textContent=won?"🏆 Победа!":"Не повезло";
  document.getElementById("tverd").className="t-verd "+(won?"w":"l");
  document.getElementById("tinfo").textContent=won?`+₽${pay.toLocaleString("ru-RU")} (ставка ×36)`:`Ставили на ${selNum}, выпало ${win}`;
  document.getElementById("ov").classList.add("on");
  document.getElementById("toast").classList.add("on");
}
 
document.getElementById("tbtn").addEventListener("click",()=>{
  document.getElementById("ov").classList.remove("on");
  document.getElementById("toast").classList.remove("on");
 
  // Сразу отправляем результат боту — он сам пересчитает и сохранит баланс
  if(window._pr){
    const r=window._pr;
    const payload=JSON.stringify({
      action:"spin_result",
      bet:r.bet,
      won:r.won,
      payout:r.pay,
      number:r.number,
      chosen:r.chosen,
      new_balance:r.new_balance
    });
    tg.sendData(payload);   // закроет Mini App и передаст данные боту
    window._pr=null;
    return;                 // дальнейший сброс не нужен — окно закрывается
  }
 
  // Если данных не было — просто сброс UI
  selNum=null;bet=0;
  document.querySelectorAll(".nb").forEach(b=>b.classList.remove("sel"));
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("on"));
  document.getElementById("betv").textContent=0;
  dis(false);upd();
  if(bal<=0){bal=100;updBal();}
});
 
function dis(v){document.querySelectorAll(".nb,.chip").forEach(b=>b.disabled=v);document.getElementById("spin").disabled=v;}
 
// Имя пользователя
const u=tg.initDataUnsafe?.user;
document.getElementById("uname").textContent=u?.first_name||u?.username||"Игрок";
 
// Баланс берём из обычного query-параметра ?bal=XXX который бот вставляет в URL
const urlParams = new URLSearchParams(window.location.search);
bal = parseInt(urlParams.get("bal")) || 0;
updBal();upd();
</script>
</body>
</html>
